name: CI

on:
  push:
    branches: [main, develop]
  # Fire on every PR regardless of base — feature PRs target develop and
  # the develop→main release batches target main. A previous version
  # filtered to `branches: [main]`, which silently skipped every feature
  # PR for two days (2026-05-16 to 2026-05-18). The E2E job below keeps
  # its own gate so the expensive path only runs on release batches.
  pull_request:
  # Allow other workflows (notably deploy.yml) to reuse this job
  # as a prerequisite gate.
  workflow_call:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

  types-check:
    name: Supabase Types Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate fresh types
        run: |
          pnpm supabase gen types typescript \
            --project-id tfddjmplcizfirxqhotv \
            > /tmp/fresh-types.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Diff against committed types
        run: |
          if ! diff -q src/lib/supabase/types.ts /tmp/fresh-types.ts > /dev/null 2>&1; then
            echo "::error::Supabase types are stale. Run: pnpm supabase gen types typescript --project-id tfddjmplcizfirxqhotv > src/lib/supabase/types.ts"
            diff src/lib/supabase/types.ts /tmp/fresh-types.ts || true
            exit 1
          fi
          echo "Types are up to date."

  template-sync:
    name: Notification Template Mirror
    runs-on: ubuntu-latest
    # Safety note: this job operates only on files checked into the repo.
    # It uses no github.event.* inputs, so the injection risks flagged by
    # the workflow-security guidance do not apply.
    steps:
      - uses: actions/checkout@v4

      - name: Verify Node/Deno template mirrors are in sync
        run: |
          NODE_DIR=src/lib/notifications/templates
          DENO_DIR=supabase/functions/_shared/templates
          if [ ! -d "$NODE_DIR" ] || [ ! -d "$DENO_DIR" ]; then
            echo "::error::Expected template directories missing (Node: $NODE_DIR, Deno: $DENO_DIR)"
            exit 1
          fi
          drift=0
          for f in "$NODE_DIR"/*.ts; do
            name=$(basename "$f")
            deno_file="$DENO_DIR/$name"
            if [ ! -f "$deno_file" ]; then
              echo "::error::Missing Deno mirror: $deno_file"
              drift=1
              continue
            fi
            # Strip import statements (Node vs Deno differ on .ts
            # extensions in specifiers) so the diff only catches real
            # template-body drift. Handles both single-line and
            # multi-line (prettier-wrapped) import blocks via brace-aware
            # awk: enter skip mode on `import ` lines without `from`,
            # exit on the closing `from '...'` line.
            #
            # Inputs are repo-tracked file paths only — no github.event.*
            # data flows into this script, so no injection surface.
            node_stripped=$(mktemp)
            deno_stripped=$(mktemp)
            awk '/^import / { if ($0 ~ /from/) { next } skip = 1; next } skip { if ($0 ~ /from/) { skip = 0 } next } { print }' "$f" > "$node_stripped"
            awk '/^import / { if ($0 ~ /from/) { next } skip = 1; next } skip { if ($0 ~ /from/) { skip = 0 } next } { print }' "$deno_file" > "$deno_stripped"
            if ! diff -q -w -B "$node_stripped" "$deno_stripped" > /dev/null 2>&1; then
              echo "::error::Template drift detected: $name"
              diff -u -w -B "$node_stripped" "$deno_stripped" || true
              drift=1
            fi
            rm -f "$node_stripped" "$deno_stripped"
          done
          if [ "$drift" != "0" ]; then
            exit 1
          fi
          echo "All notification templates in sync."

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - run: pnpm test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
