name: CI

on:
  push:
    branches: [main, develop]
  # Fire on every PR regardless of base — feature PRs target develop and
  # the develop→main release batches target main. A previous version
  # filtered to `branches: [main]`, which silently skipped every feature
  # PR for two days (2026-05-16 to 2026-05-18). The E2E job below keeps
  # its own gate so the expensive path only runs on release batches.
  pull_request:
  # Allow other workflows (notably deploy.yml) to reuse this job
  # as a prerequisite gate.
  workflow_call:

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '9'
  # Run JS-based actions (checkout, setup-node, pnpm, docker/*) on Node 24 now.
  # GitHub forces this default on 2026-06-02 and Node 20 is removed 2026-09-16;
  # this opt-in covers every action regardless of its pinned tag and
  # self-obsoletes once Node 24 is the runner default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

  types-check:
    name: Supabase Types Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate fresh types
        run: |
          pnpm supabase gen types typescript \
            --project-id tfddjmplcizfirxqhotv \
            > /tmp/fresh-types.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Diff against committed types
        run: |
          if ! diff -q src/lib/supabase/types.ts /tmp/fresh-types.ts > /dev/null 2>&1; then
            echo "::error::Supabase types are stale. Run: pnpm supabase gen types typescript --project-id tfddjmplcizfirxqhotv > src/lib/supabase/types.ts"
            diff src/lib/supabase/types.ts /tmp/fresh-types.ts || true
            exit 1
          fi
          echo "Types are up to date."

  template-sync:
    name: Notification Template Mirror
    runs-on: ubuntu-latest
    # Safety note: this job operates only on files checked into the repo.
    # It uses no github.event.* inputs, so the injection risks flagged by
    # the workflow-security guidance do not apply.
    steps:
      - uses: actions/checkout@v4

      # Delegates to scripts/sync-mirrors.sh --check — the single source of
      # truth for "what counts as in sync." Same script the local pre-push
      # hook runs (scripts/git-hooks/pre-push), so CI and pre-push catch the
      # same drift. Stricter than the previous CI block, which stripped
      # comments before diffing and let comment-only drift slip through
      # (see PR #105 fix(qa): ISSUE-001 — schedule-transition mirror had
      # silently drifted in docstrings without tripping CI).
      #
      # No github.event.* data flows into this step — the script reads only
      # repo-tracked file paths, so no injection surface.
      - name: Verify Node/Deno mirrors are in sync
        run: bash scripts/sync-mirrors.sh --check

      - name: Verify schedule-transition mirror is in sync
        run: |
          node_file=src/lib/booking/schedule-transition.ts
          deno_file=supabase/functions/_shared/schedule-transition.ts
          node_stripped=$(mktemp)
          deno_stripped=$(mktemp)
          grep -v '^import ' "$node_file" | grep -v '^//' | grep -v '^ \*' | grep -v '^/\*' | grep -v '^$' > "$node_stripped" || true
          grep -v '^import ' "$deno_file" | grep -v '^//' | grep -v '^ \*' | grep -v '^/\*' | grep -v '^$' > "$deno_stripped" || true
          if ! diff -q -w -B "$node_stripped" "$deno_stripped" > /dev/null 2>&1; then
            echo "::error::schedule-transition mirror drift detected between $node_file and $deno_file"
            diff -u -w -B "$node_stripped" "$deno_stripped" || true
            rm -f "$node_stripped" "$deno_stripped"
            exit 1
          fi
          rm -f "$node_stripped" "$deno_stripped"
          echo "schedule-transition mirrors in sync."

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # VER-243/244: the chromium download intermittently stalls on the GitHub
      # runner (1m24s on 2026-05-28, then over 5 min on 05-30 at an identical
      # Playwright version: a CDN/network blip, not a version or `--with-deps`
      # issue). Cache the browser binaries keyed on the Playwright version so a warm
      # run skips the download entirely; on a cold run, retry the install on a fresh
      # connection so a single stalled fetch is abandoned and re-attempted rather
      # than failing the gate. Install always runs (no cache-hit skip) because
      # `playwright install` is idempotent: a real hit is a fast no-op and a partial
      # cache is completed, which also self-heals a partial-download cache left by a
      # prior timeout.
      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version | cut -d' ' -f2)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}-v2

      - name: Install Playwright browsers (retry on stall)
        timeout-minutes: 16
        run: |
          for attempt in 1 2 3; do
            echo "::group::playwright install — attempt $attempt"
            if timeout 300 pnpm exec playwright install chromium; then
              echo "::endgroup::"
              echo "chromium ready on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "attempt $attempt stalled or failed; retrying on a fresh connection..."
            sleep 5
          done
          echo "chromium install failed after 3 attempts" >&2
          exit 1

      - run: pnpm test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
